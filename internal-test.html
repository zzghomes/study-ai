<!DOCTYPE html>
<html lang="zh-CN" data-theme="space">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌌 星空主题 - 内部测试版</title>
  <meta http-equiv="Cache-Control" content="no-cache">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* 自然风景背景 */
    body {
      font-family: -apple-system, sans-serif;
      background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80') center/cover fixed;
      min-height: 100vh;
      color: #fff;
      position: relative;
    }
    
    /* 遮罩层 */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, rgba(10,10,30,0.75) 0%, rgba(20,20,50,0.7) 50%, rgba(15,30,60,0.75) 100%);
      z-index: 0;
    }
    
    /* 星星容器 */
    #stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 3s infinite;
    }
    
    @keyframes twinkle {
      0%,100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }
    
    .shooting-star {
      position: absolute;
      width: 4px; height: 4px;
      background: #fff;
      border-radius: 50%;
      animation: shoot 8s infinite linear;
    }
    
    .shooting-star::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 150px; height: 2px;
      background: linear-gradient(90deg, #fff, transparent);
    }
    
    @keyframes shoot {
      0% { opacity: 0; transform: translate(0,0) rotate(45deg); }
      10% { opacity: 1; }
      30% { opacity: 0; transform: translate(300px,300px) rotate(45deg); }
    }
    
    /* 内容 */
    .content {
      position: relative;
      z-index: 10;
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 20px;
    }
    
    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      color: #fff !important;
      text-shadow: 0 3px 15px rgba(0,0,0,0.9);
    }
    
    .card {
      background: rgba(10,10,30,0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 32px;
      margin: 20px 0;
      color: #fff;
    }
    
    .card h2 {
      color: #fff !important;
      margin-bottom: 16px;
    }
    
    .card p {
      color: #fff;
      line-height: 1.6;
    }
    
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 10px;
      margin: 8px;
      cursor: pointer;
    }
    
    .debug {
      position: fixed;
      top: 10px; right: 10px;
      background: rgba(0,0,0,0.8);
      color: #0f0;
      padding: 16px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="stars"></div>
  
  <div class="debug" id="debug">检测中...</div>
  
  <div class="content">
    <h1>🌌 星空主题内部测试</h1>
    
    <div class="card">
      <h2>✅ 测试项目</h2>
      <p>
        • 背景：自然风景图片（山脉）<br>
        • 星星：80 颗闪烁<br>
        • 流星：3 颗循环<br>
        • 卡片：8% 透明度 + 毛玻璃<br>
        • 文字：白色带阴影
      </p>
    </div>
    
    <div class="card">
      <h2>🔧 操作</h2>
      <button class="btn" onclick="check()">🔍 重新检测</button>
      <button class="btn" onclick="location.reload()">🔄 刷新</button>
      <a href="index.html" class="btn">🏠 打开 AI 探险家</a>
    </div>
  </div>
  
  <script>
    // 创建星星
    const container = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      const size = Math.random() * 2 + 1;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.animationDelay = Math.random() * 3 + 's';
      container.appendChild(star);
    }
    
    // 创建流星
    for (let i = 0; i < 3; i++) {
      const shootingStar = document.createElement('div');
      shootingStar.className = 'shooting-star';
      shootingStar.style.left = (Math.random() * 50 + 25) + '%';
      shootingStar.style.top = (Math.random() * 30 + 10) + '%';
      shootingStar.style.animationDelay = (Math.random() * 8 + i * 2) + 's';
      container.appendChild(shootingStar);
    }
    
    // 检测
    function check() {
      const stars = document.querySelectorAll('.star').length;
      const shootingStars = document.querySelectorAll('.shooting-star').length;
      const bg = window.getComputedStyle(document.body).backgroundImage;
      const theme = document.documentElement.getAttribute('data-theme');
      
      document.getElementById('debug').innerHTML = `
        <div>⭐ 星星：${stars}</div>
        <div>☄️ 流星：${shootingStars}</div>
        <div>🎨 背景：${bg.includes('unsplash') ? '✅' : '❌'}</div>
        <div>🏷️ 主题：${theme}</div>
      `;
    }
    
    setTimeout(check, 500);
    setTimeout(check, 2000);
  </script>
</body>
</html>
