<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌌 AI 探险家 - 星空主题调试版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      min-height: 100vh;
      color: #fff !important;
      position: relative;
      overflow-x: hidden;
    }
    
    /* 强制应用星空背景 */
    body {
      background: url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5980?w=1920&q=80') center/cover no-repeat fixed !important;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(10,10,30,0.85) 0%, rgba(20,20,50,0.75) 50%, rgba(15,30,60,0.80) 100%);
      z-index: 0;
      pointer-events: none;
    }
    
    .stars-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }
    
    .star {
      position: absolute;
      background: #fff !important;
      border-radius: 50%;
      animation: twinkle var(--duration, 3s) infinite ease-in-out;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.4);
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: var(--opacity-start, 0.3); transform: scale(1); }
      50% { opacity: var(--opacity-end, 1); transform: scale(1.2); }
    }
    
    .shooting-star {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fff !important;
      border-radius: 50%;
      box-shadow: 0 0 15px 3px rgba(255, 255, 255, 0.8), 0 0 30px rgba(255, 255, 255, 0.4);
      animation: shoot 8s infinite linear;
      opacity: 0;
    }
    
    .shooting-star::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 200px;
      height: 2px;
      background: linear-gradient(90deg, #fff, transparent);
      transform: translateX(100%);
    }
    
    @keyframes shoot {
      0% { opacity: 0; transform: translate(0, 0) rotate(45deg); }
      5% { opacity: 1; }
      20% { opacity: 0; transform: translate(300px, 300px) rotate(45deg); }
      100% { opacity: 0; }
    }
    
    .content {
      position: relative;
      z-index: 10;
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 20px 100px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    h1 {
      font-size: 48px;
      margin-bottom: 16px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      color: #fff !important;
    }
    
    .subtitle {
      font-size: 20px;
      opacity: 0.9;
      color: #fff !important;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.08) !important;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 40px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }
    
    .card h2 {
      margin-bottom: 16px;
      font-size: 28px;
      color: #fff !important;
    }
    
    .card p {
      font-size: 16px;
      line-height: 1.6;
      opacity: 0.9;
      color: #fff !important;
    }
    
    .debug-info {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.8);
      color: #0f0;
      padding: 16px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      max-width: 400px;
      border: 1px solid #0f0;
    }
    
    .btn-group {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.8) 0%, rgba(108, 92, 231, 0.8) 100%);
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
    }
    
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(168, 85, 247, 0.5);
    }
  </style>
</head>
<body>
  <div class="stars-container" id="stars"></div>
  
  <div class="debug-info" id="debug">
    <div>🔍 调试信息</div>
    <div id="debug-content">加载中...</div>
  </div>
  
  <div class="content">
    <div class="header">
      <h1>🌌 星空主题调试版</h1>
      <p class="subtitle">如果看到星星和背景图，说明 CSS 正常工作</p>
    </div>
    
    <div class="card">
      <h2>✨ 测试项目</h2>
      <p id="test-results">正在检测...</p>
    </div>
    
    <div class="btn-group">
      <a href="index.html" class="btn">🏠 返回原版</a>
      <button class="btn" onclick="checkStars()">🔍 重新检测</button>
      <button class="btn" onclick="location.reload()">🔄 刷新</button>
    </div>
  </div>
  
  <script>
    const debug = document.getElementById('debug-content');
    const testResults = document.getElementById('test-results');
    
    // 创建星星
    const container = document.getElementById('stars');
    let starCount = 0;
    let shootingStarCount = 0;
    
    // 创建 100 颗星星
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      const size = Math.random() * 3 + 1;
      star.style.width = star.style.height = size + 'px';
      star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
      star.style.setProperty('--opacity-start', (Math.random() * 0.5 + 0.2));
      star.style.setProperty('--opacity-end', (Math.random() * 0.7 + 0.8));
      star.style.animationDelay = Math.random() * 3 + 's';
      container.appendChild(star);
      starCount++;
    }
    
    // 创建 3 颗流星
    for (let i = 0; i < 3; i++) {
      const shootingStar = document.createElement('div');
      shootingStar.className = 'shooting-star';
      shootingStar.style.left = (Math.random() * 50 + 25) + '%';
      shootingStar.style.top = (Math.random() * 30 + 10) + '%';
      shootingStar.style.animationDelay = (Math.random() * 8 + i * 3) + 's';
      container.appendChild(shootingStar);
      shootingStarCount++;
    }
    
    function checkStars() {
      const stars = document.querySelectorAll('.star').length;
      const shootingStars = document.querySelectorAll('.shooting-star').length;
      const bodyBg = window.getComputedStyle(document.body).backgroundImage;
      const bodyColor = window.getComputedStyle(document.body).color;
      
      debug.innerHTML = `
        <div>⭐ 星星数量：${stars}</div>
        <div>☄️ 流星数量：${shootingStars}</div>
        <div>🎨 背景图：${bodyBg.substring(0, 50)}...</div>
        <div>📝 文字颜色：${bodyColor}</div>
        <div>🕐 时间：${new Date().toLocaleTimeString()}</div>
      `;
      
      testResults.innerHTML = `
        ✅ 星星：<strong>${stars} 颗</strong>（应该 100 颗）<br>
        ✅ 流星：<strong>${shootingStars} 颗</strong>（应该 3 颗）<br>
        ✅ 背景：<strong>${bodyBg.includes('unsplash') ? '星空图片已加载' : '图片未加载'}</strong><br>
        ✅ 文字：<strong>${bodyColor === 'rgb(255, 255, 255)' ? '白色（正确）' : bodyColor}</strong>
      `;
    }
    
    // 延迟执行检测
    setTimeout(checkStars, 500);
    setTimeout(checkStars, 2000);
  </script>
</body>
</html>
