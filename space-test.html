<!DOCTYPE html>
<html lang="zh-CN" data-theme="space">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌌 星空主题测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      background-image: url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5980?w=1920&q=80');
      background-size: cover;
      background-attachment: fixed;
      min-height: 100vh;
      color: #fff;
      position: relative;
      overflow-x: hidden;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(10,10,30,0.85) 0%, rgba(20,20,50,0.75) 50%, rgba(15,30,60,0.80) 100%);
      z-index: 0;
    }
    
    .stars-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }
    
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--duration, 3s) infinite ease-in-out;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.4);
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: var(--opacity-start, 0.3); transform: scale(1); }
      50% { opacity: var(--opacity-end, 1); transform: scale(1.2); }
    }
    
    .shooting-star {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 15px 3px rgba(255, 255, 255, 0.8), 0 0 30px rgba(255, 255, 255, 0.4);
      animation: shoot 8s infinite linear;
      opacity: 0;
    }
    
    .shooting-star::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 200px;
      height: 2px;
      background: linear-gradient(90deg, #fff, transparent);
      transform: translateX(100%);
    }
    
    @keyframes shoot {
      0% { opacity: 0; transform: translate(0, 0) rotate(45deg); }
      5% { opacity: 1; }
      20% { opacity: 0; transform: translate(300px, 300px) rotate(45deg); }
      100% { opacity: 0; }
    }
    
    .content {
      position: relative;
      z-index: 10;
      max-width: 800px;
      margin: 0 auto;
      padding: 100px 20px;
      text-align: center;
    }
    
    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }
    
    p {
      font-size: 20px;
      opacity: 0.9;
      margin-bottom: 40px;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }
    
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 32px;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.8) 0%, rgba(108, 92, 231, 0.8) 100%);
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(168, 85, 247, 0.5);
    }
  </style>
</head>
<body>
  <div class="stars-container" id="stars"></div>
  
  <div class="content">
    <h1>🌌 星空宇宙主题</h1>
    <p>100 颗闪烁的星星 + 流星划过夜空</p>
    
    <div class="card">
      <h2 style="margin-bottom: 16px;">✨ 动态效果</h2>
      <p style="margin-bottom: 24px;">
        抬头看！夜空中有：<br>
        ⭐ 100 颗随机闪烁的星星<br>
        ☄️ 3 颗流星每 8 秒循环划过<br>
        🎨 毛玻璃效果卡片
      </p>
      <a href="index.html" class="btn">🏠 返回 AI 探险家</a>
    </div>
  </div>
  
  <script>
    // 创建星星
    const container = document.getElementById('stars');
    
    // 创建 100 颗星星
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      const size = Math.random() * 3 + 1;
      star.style.width = star.style.height = size + 'px';
      star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
      star.style.setProperty('--opacity-start', (Math.random() * 0.5 + 0.2));
      star.style.setProperty('--opacity-end', (Math.random() * 0.7 + 0.8));
      star.style.animationDelay = Math.random() * 3 + 's';
      container.appendChild(star);
    }
    
    // 创建 3 颗流星
    for (let i = 0; i < 3; i++) {
      const shootingStar = document.createElement('div');
      shootingStar.className = 'shooting-star';
      shootingStar.style.left = (Math.random() * 50 + 25) + '%';
      shootingStar.style.top = (Math.random() * 30 + 10) + '%';
      shootingStar.style.animationDelay = (Math.random() * 8 + i * 3) + 's';
      container.appendChild(shootingStar);
    }
  </script>
</body>
</html>
