<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧪 AI 探险家 - 功能测试工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: #1d1d1f;
      color: #f5f5f7;
      padding: 40px;
      min-height: 100vh;
    }
    h1 { font-size: 32px; margin-bottom: 24px; }
    h2 { font-size: 24px; margin: 32px 0 16px; color: #86868b; }
    .test-section {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .test-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .test-item:hover { background: rgba(255,255,255,0.1); }
    .test-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    .test-item label {
      flex: 1;
      cursor: pointer;
      font-size: 15px;
    }
    .status {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 600;
    }
    .status.pass { background: rgba(52, 199, 89, 0.2); color: #34c759; }
    .status.fail { background: rgba(255, 59, 48, 0.2); color: #ff3b30; }
    .status.pending { background: rgba(255, 149, 0, 0.2); color: #ff9500; }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin: 8px 8px 8px 0;
      transition: all 0.2s;
    }
    .btn-primary { background: #0071e3; color: white; }
    .btn-primary:hover { background: #005bb5; }
    .btn-success { background: #34c759; color: white; }
    .btn-success:hover { background: #28a745; }
    .btn-danger { background: #ff3b30; color: white; }
    .btn-danger:hover { background: #d63030; }
    .progress-bar {
      height: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
      margin: 16px 0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #34c759, #30d158);
      transition: width 0.3s;
      width: 0%;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin: 24px 0;
    }
    .summary-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .summary-value { font-size: 32px; font-weight: 700; }
    .summary-label { font-size: 13px; color: #86868b; margin-top: 8px; }
    .bug-report {
      background: rgba(255, 59, 48, 0.1);
      border: 1px solid rgba(255, 59, 48, 0.3);
      border-radius: 12px;
      padding: 16px;
      margin: 16px 0;
    }
    .bug-report textarea {
      width: 100%;
      min-height: 100px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px;
      color: #f5f5f7;
      font-family: inherit;
      resize: vertical;
    }
  </style>
</head>
<body>
  <h1>🧪 AI 探险家 - 功能测试工具</h1>
  
  <div class="summary">
    <div class="summary-card">
      <div class="summary-value" id="total-count">0</div>
      <div class="summary-label">总测试项</div>
    </div>
    <div class="summary-card">
      <div class="summary-value" id="passed-count" style="color: #34c759;">0</div>
      <div class="summary-label">已通过</div>
    </div>
    <div class="summary-card">
      <div class="summary-value" id="progress-percent">0%</div>
      <div class="summary-label">完成度</div>
    </div>
  </div>
  
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  
  <div style="margin: 24px 0;">
    <button class="btn btn-primary" onclick="openApp()">🚀 打开应用</button>
    <button class="btn btn-success" onclick="selectAll()">✅ 全选</button>
    <button class="btn btn-danger" onclick="deselectAll()">❌ 取消全选</button>
    <button class="btn" style="background: rgba(255,255,255,0.1);" onclick="exportReport()">📄 导出报告</button>
  </div>

  <div class="test-section">
    <h2>📋 1. 核心功能测试</h2>
    <div class="test-item"><input type="checkbox" id="test-1-1"><label for="test-1-1">页面正常加载，无白屏</label></div>
    <div class="test-item"><input type="checkbox" id="test-1-2"><label for="test-1-2">欢迎视频/卡片正常显示</label></div>
    <div class="test-item"><input type="checkbox" id="test-1-3"><label for="test-1-3">欢迎标题显示正确（根据时间）</label></div>
    <div class="test-item"><input type="checkbox" id="test-1-4"><label for="test-1-4">XP 进度条显示正确</label></div>
    <div class="test-item"><input type="checkbox" id="test-1-5"><label for="test-1-5">连击计数器显示正确</label></div>
    <div class="test-item"><input type="checkbox" id="test-1-6"><label for="test-1-6">学习进度卡片数据正确</label></div>
    <div class="test-item"><input type="checkbox" id="test-1-7"><label for="test-1-7">今日任务卡片显示</label></div>
  </div>

  <div class="test-section">
    <h2>🧭 2. 导航系统测试</h2>
    <div class="test-item"><input type="checkbox" id="test-2-1"><label for="test-2-1">点击"🏠 首页"正常切换</label></div>
    <div class="test-item"><input type="checkbox" id="test-2-2"><label for="test-2-2">点击"📋 任务"正常切换</label></div>
    <div class="test-item"><input type="checkbox" id="test-2-3"><label for="test-2-3">点击"🏆 成就"正常切换</label></div>
    <div class="test-item"><input type="checkbox" id="test-2-4"><label for="test-2-4">点击"📸 作品"正常切换</label></div>
    <div class="test-item"><input type="checkbox" id="test-2-5"><label for="test-2-5">点击"📔 日记"正常切换</label></div>
    <div class="test-item"><input type="checkbox" id="test-2-6"><label for="test-2-6">点击"📚 知识库"正常切换</label></div>
    <div class="test-item"><input type="checkbox" id="test-2-7"><label for="test-2-7">点击"👨‍👩‍👧 家长"正常切换</label></div>
    <div class="test-item"><input type="checkbox" id="test-2-8"><label for="test-2-8">导航按钮高亮状态正确</label></div>
  </div>

  <div class="test-section">
    <h2>🎨 3. 主题切换测试</h2>
    <div class="test-item"><input type="checkbox" id="test-3-1"><label for="test-3-1">粘土风主题正常显示</label></div>
    <div class="test-item"><input type="checkbox" id="test-3-2"><label for="test-3-2">珊瑚橙主题正常显示</label></div>
    <div class="test-item"><input type="checkbox" id="test-3-3"><label for="test-3-3">薄荷绿主题正常显示</label></div>
    <div class="test-item"><input type="checkbox" id="test-3-4"><label for="test-3-4">薰衣草紫主题正常显示</label></div>
    <div class="test-item"><input type="checkbox" id="test-3-5"><label for="test-3-5">日落橙主题正常显示</label></div>
    <div class="test-item"><input type="checkbox" id="test-3-6"><label for="test-3-6">海洋蓝主题正常显示</label></div>
    <div class="test-item"><input type="checkbox" id="test-3-7"><label for="test-3-7">主题保存在刷新后仍然有效</label></div>
  </div>

  <div class="test-section">
    <h2>📋 4. 任务系统测试</h2>
    <div class="test-item"><input type="checkbox" id="test-4-1"><label for="test-4-1">任务页面显示 7 天任务</label></div>
    <div class="test-item"><input type="checkbox" id="test-4-2"><label for="test-4-2">任务卡片信息正确</label></div>
    <div class="test-item"><input type="checkbox" id="test-4-3"><label for="test-4-3">完成任务状态显示正确</label></div>
    <div class="test-item"><input type="checkbox" id="test-4-4"><label for="test-4-4">任务详情模态框正常打开</label></div>
    <div class="test-item"><input type="checkbox" id="test-4-5"><label for="test-4-5">小任务列表显示完整</label></div>
    <div class="test-item"><input type="checkbox" id="test-4-6"><label for="test-4-6">完成任务获得 XP</label></div>
  </div>

  <div class="test-section">
    <h2>🏆 5. 成就系统测试</h2>
    <div class="test-item"><input type="checkbox" id="test-5-1"><label for="test-5-1">徽章网格正常显示</label></div>
    <div class="test-item"><input type="checkbox" id="test-5-2"><label for="test-5-2">已解锁徽章显示彩色</label></div>
    <div class="test-item"><input type="checkbox" id="test-5-3"><label for="test-5-3">未解锁徽章显示灰色锁定</label></div>
    <div class="test-item"><input type="checkbox" id="test-5-4"><label for="test-5-4">奖励列表正常显示</label></div>
  </div>

  <div class="test-section">
    <h2>📸 6. 作品墙测试</h2>
    <div class="test-item"><input type="checkbox" id="test-6-1"><label for="test-6-1">空状态引导正常显示</label></div>
    <div class="test-item"><input type="checkbox" id="test-6-2"><label for="test-6-2">添加作品模态框正常打开</label></div>
    <div class="test-item"><input type="checkbox" id="test-6-3"><label for="test-6-3">作品保存成功</label></div>
    <div class="test-item"><input type="checkbox" id="test-6-4"><label for="test-6-4">作品卡片显示正确</label></div>
  </div>

  <div class="test-section">
    <h2>📔 7. 日记功能测试</h2>
    <div class="test-item"><input type="checkbox" id="test-7-1"><label for="test-7-1">日记页面正常显示</label></div>
    <div class="test-item"><input type="checkbox" id="test-7-2"><label for="test-7-2">写日记按钮正常</label></div>
    <div class="test-item"><input type="checkbox" id="test-7-3"><label for="test-7-3">添加日记模态框正常</label></div>
    <div class="test-item"><input type="checkbox" id="test-7-4"><label for="test-7-4">心情选择功能正常</label></div>
    <div class="test-item"><input type="checkbox" id="test-7-5"><label for="test-7-5">日记保存成功</label></div>
    <div class="test-item"><input type="checkbox" id="test-7-6"><label for="test-7-6">浏览所有日记正常</label></div>
    <div class="test-item"><input type="checkbox" id="test-7-7"><label for="test-7-7">日记统计功能正常</label></div>
  </div>

  <div class="test-section">
    <h2>📚 8. 知识库功能测试</h2>
    <div class="test-item"><input type="checkbox" id="test-8-1"><label for="test-8-1">知识库页面正常显示</label></div>
    <div class="test-item"><input type="checkbox" id="test-8-2"><label for="test-8-2">学习资源预览正常</label></div>
    <div class="test-item"><input type="checkbox" id="test-8-3"><label for="test-8-3">提示词模板显示正常</label></div>
    <div class="test-item"><input type="checkbox" id="test-8-4"><label for="test-8-4">我的收藏功能正常</label></div>
    <div class="test-item"><input type="checkbox" id="test-8-5"><label for="test-8-5">收藏功能正常</label></div>
  </div>

  <div class="test-section">
    <h2>👨‍👩‍👧 9. 家长中心测试</h2>
    <div class="test-item"><input type="checkbox" id="test-9-1"><label for="test-9-1">孩子选择器显示正常</label></div>
    <div class="test-item"><input type="checkbox" id="test-9-2"><label for="test-9-2">学习报告数据正确</label></div>
    <div class="test-item"><input type="checkbox" id="test-9-3"><label for="test-9-3">PDF 导出功能正常</label></div>
    <div class="test-item"><input type="checkbox" id="test-9-4"><label for="test-9-4">热力图显示正常</label></div>
    <div class="test-item"><input type="checkbox" id="test-9-5"><label for="test-9-5">能力雷达图正常</label></div>
    <div class="test-item"><input type="checkbox" id="test-9-6"><label for="test-9-6">月度对比功能正常</label></div>
    <div class="test-item"><input type="checkbox" id="test-9-7"><label for="test-9-7">个性化推荐正常</label></div>
    <div class="test-item"><input type="checkbox" id="test-9-8"><label for="test-9-8">AI 评语生成正常</label></div>
  </div>

  <div class="test-section">
    <h2>🎮 10. 游戏化功能测试</h2>
    <div class="test-item"><input type="checkbox" id="test-10-1"><label for="test-10-1">XP 累积计算正确</label></div>
    <div class="test-item"><input type="checkbox" id="test-10-2"><label for="test-10-2">等级提升庆祝显示</label></div>
    <div class="test-item"><input type="checkbox" id="test-10-3"><label for="test-10-3">连击系统正常</label></div>
    <div class="test-item"><input type="checkbox" id="test-10-4"><label for="test-10-4">音效系统正常</label></div>
  </div>

  <div class="test-section">
    <h2>🐛 BUG 记录</h2>
    <div class="bug-report">
      <h3 style="margin-bottom: 12px;">发现的问题：</h3>
      <textarea id="bug-notes" placeholder="请在此记录测试过程中发现的 BUG..."></textarea>
    </div>
  </div>

  <div class="test-section">
    <h2>📝 测试总结</h2>
    <div style="display: grid; gap: 16px;">
      <div>
        <label style="display: block; margin-bottom: 8px;">测试日期：</label>
        <input type="date" id="test-date" style="padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-family: inherit;">
      </div>
      <div>
        <label style="display: block; margin-bottom: 8px;">测试人员：</label>
        <input type="text" id="tester-name" placeholder="输入测试人员姓名" style="padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-family: inherit; width: 100%;">
      </div>
      <div>
        <label style="display: block; margin-bottom: 8px;">整体评价：</label>
        <select id="overall-rating" style="padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-family: inherit; width: 100%;">
          <option value="">选择评价</option>
          <option value="优秀">⭐⭐⭐⭐⭐ 优秀</option>
          <option value="良好">⭐⭐⭐⭐ 良好</option>
          <option value="一般">⭐⭐⭐ 一般</option>
          <option value="需改进">⭐⭐ 需改进</option>
        </select>
      </div>
    </div>
  </div>

  <script>
    // 设置今天的日期
    document.getElementById('test-date').value = new Date().toISOString().split('T')[0];

    // 更新统计
    function updateStats() {
      const checkboxes = document.querySelectorAll('input[type="checkbox"]');
      const total = checkboxes.length;
      const checked = Array.from(checkboxes).filter(cb => cb.checked).length;
      const percent = Math.round((checked / total) * 100);

      document.getElementById('total-count').textContent = total;
      document.getElementById('passed-count').textContent = checked;
      document.getElementById('progress-percent').textContent = percent + '%';
      document.getElementById('progress-fill').style.width = percent + '%';
    }

    // 绑定事件
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', updateStats);
    });

    // 全选
    function selectAll() {
      document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
      updateStats();
    }

    // 取消全选
    function deselectAll() {
      document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
      updateStats();
    }

    // 打开应用
    function openApp() {
      window.open('index.html', '_blank');
    }

    // 导出报告
    function exportReport() {
      const checkboxes = document.querySelectorAll('input[type="checkbox"]');
      const total = checkboxes.length;
      const checked = Array.from(checkboxes).filter(cb => cb.checked).length;
      const percent = Math.round((checked / total) * 100);

      const report = `
🧪 AI 探险家 - 功能测试报告
========================

测试日期：${document.getElementById('test-date').value}
测试人员：${document.getElementById('tester-name').value}
整体评价：${document.getElementById('overall-rating').value}

测试结果：
- 总测试项：${total}
- 已通过：${checked}
- 完成度：${percent}%

测试详情：
${Array.from(checkboxes).map(cb => `- [${cb.checked ? 'x' : ' '}] ${cb.nextElementSibling.textContent}`).join('\n')}

发现的 BUG:
${document.getElementById('bug-notes').value || '无'}

========================
生成时间：${new Date().toLocaleString('zh-CN')}
      `.trim();

      const blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `test-report-${new Date().toISOString().split('T')[0]}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // 初始化统计
    updateStats();
  </script>
</body>
</html>
