<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试图片路径</title>
</head>
<body>
  <h1>测试豆包图片路径</h1>
  
  <h2>测试 1: 相对路径 logos/doubao.png</h2>
  <img src="logos/doubao.png" alt="豆包" style="width: 100px; height: 100px; border: 2px solid red;">
  
  <h2>测试 2: 完整路径</h2>
  <img src="file:///C:/Users/Administrator/.openclaw/workspace/ai-explorer/logos/doubao.png" alt="豆包" style="width: 100px; height: 100px; border: 2px solid blue;">
  
  <h2>测试 3: 当前目录</h2>
  <img src="./logos/doubao.png" alt="豆包" style="width: 100px; height: 100px; border: 2px solid green;">
  
  <script>
    window.onload = function() {
      const imgs = document.querySelectorAll('img');
      imgs.forEach((img, i) => {
        img.onerror = function() {
          this.parentElement.innerHTML += `<p style="color: red;">❌ 图片 ${i+1} 加载失败</p>`;
        };
        img.onload = function() {
          this.parentElement.innerHTML += `<p style="color: green;">✅ 图片 ${i+1} 加载成功</p>`;
        };
      });
    };
  </script>
</body>
</html>
